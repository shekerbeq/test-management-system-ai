spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/tms_db
    username: tms_user
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope:
              - email
              - profile

jwt:
  secret: ${JWT_SECRET:qT6Nf9vY2kL8wR5dX1eS3aC7zG0bM4nO+0dF1gH2iJ3kL4mN5oP6qR7sT8uV9wX0yZ1aB2cD3eF4gH5iJ6kL7}
  expiration-ms: 900000
deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-your-deepseek-key}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  url: ${DEEPSEEK_URL:https://api.deepseek.com/v1/chat/completions}

logging:
  level:
    org.springframework.security: DEBUG
    kz.testmanagement: DEBUG