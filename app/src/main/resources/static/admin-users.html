<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Әкімшілік — Eduvibe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header id="global-header"></header>

<main class="container">
    <section class="panel section-title">
        <span class="eyebrow">Admin</span>
        <h1>Пайдаланушылар</h1>
        <p>Жүйедегі аккаунттарды қарау және қажет болса жергілікті тізімнен өшіру.</p>
    </section>

    <section class="card">
        <table>
            <thead>
            <tr>
                <th>Аты-жөні</th>
                <th>Email</th>
                <th>Рөл</th>
                <th style="text-align:right">Әрекет</th>
            </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
        </table>
    </section>
</main>

<script src="app.js"></script>
<script>
    const admin = currentUser();
    if (!admin || admin.role !== 'ADMIN') {
        window.location.href = 'error.html';
    }

    function loadAdminUsers() {
        const users = JSON.parse(localStorage.getItem('users')) || [];
        const tbody = document.getElementById('usersTableBody');

        if (!users.length) {
            tbody.innerHTML = '<tr><td colspan="4">Жергілікті тізімде пайдаланушы жоқ</td></tr>';
            return;
        }

        tbody.innerHTML = users.map(user => `
            <tr id="user_row_${user.email}">
                <td><b>${user.name || user.fullName || '-'}</b></td>
                <td>${user.email}</td>
                <td><span class="badge ${user.role === 'TEACHER' ? '' : 'badge-secondary'}">${user.role}</span></td>
                <td style="text-align:right">
                    <button onclick="deleteUser('${user.email}')" class="btn btn-danger btn-sm">Жою</button>
                </td>
            </tr>
        `).join('');
    }

    function deleteUser(email) {
        let users = JSON.parse(localStorage.getItem('users')) || [];
        users = users.filter(u => u.email !== email);
        localStorage.setItem('users', JSON.stringify(users));
        showToast('Пайдаланушы өшірілді');
        loadAdminUsers();
    }

    loadAdminUsers();
</script>
</body>
</html>
