<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Әкімшілік — Eduvibe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header id="global-header"></header>

<main class="container">
    <section class="panel section-title">
        <span class="eyebrow">Admin</span>
        <h1 data-i18n="adminPanel">Админ-панель</h1>
        <p>Пайдаланушыларды, рөлдерді, audit log және AI шығындарын басқару.</p>
    </section>

    <section class="card">
        <h2 data-i18n="users">Пользователи</h2>
        <div class="toolbar">
            <button class="btn btn-danger" onclick="clearOldTests()">Барлық сынақтарды өшіру</button>
            <button class="btn btn-danger" onclick="clearUsers()">Есептік жазбаларды тазалау</button>
        </div>
        <table>
            <thead>
            <tr>
                <th>Аты-жөні</th>
                <th>Email</th>
                <th data-i18n="role">Роль</th>
                <th data-i18n="status">Статус</th>
                <th style="text-align:right" data-i18n="actions">Действия</th>
            </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
        </table>
    </section>

    <section class="card">
        <h2 data-i18n="allTests">Все тесты</h2>
        <div id="adminTestStats" class="stat-grid"></div>
        <table>
            <thead>
            <tr>
                <th data-i18n="tests">Тесты</th>
                <th data-i18n="teacher">Учитель</th>
                <th data-i18n="status">Статус</th>
                <th data-i18n="attempts">Попытки</th>
                <th data-i18n="average">Средний балл</th>
                <th data-i18n="passRate">Сдали</th>
                <th data-i18n="inviteCode">Код</th>
            </tr>
            </thead>
            <tbody id="adminTestsBody"></tbody>
        </table>
    </section>

    <section class="card">
        <h2>AI usage</h2>
        <div id="aiUsage">Жүктелуде...</div>
    </section>

    <section class="card">
        <h2>AI баптауы</h2>
        <div class="form-grid">
            <label>Provider<input id="aiProvider" value="deepseek"></label>
            <label>Model<input id="aiModel" value="deepseek-chat"></label>
            <label>Base URL<input id="aiBaseUrl" value="https://api.deepseek.com/v1/chat/completions"></label>
            <label>Timeout<input id="aiTimeout" type="number" value="10"></label>
        </div>
        <button class="btn btn-primary" onclick="saveAiSettings()">Сақтау</button>
    </section>

    <section class="card">
        <h2>Audit log</h2>
        <table>
            <thead>
            <tr>
                <th>User</th>
                <th>Action</th>
                <th>Path</th>
                <th>IP</th>
            </tr>
            </thead>
            <tbody id="auditTableBody"></tbody>
        </table>
    </section>
</main>

<script src="app.js"></script>
<script>
    const admin = currentUser();
    if (!admin || admin.role !== 'ADMIN') {
        window.location.href = 'error.html';
    }

    async function loadAdminUsers() {
        const users = await request('/admin/users', 'GET');
        const tbody = document.getElementById('usersTableBody');
        if (!users.length) {
            tbody.innerHTML = '<tr><td colspan="5">Пайдаланушы жоқ</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(user => `
            <tr>
                <td><b>${user.fullName || '-'}</b></td>
                <td>${user.email}</td>
                <td>
                    <select onchange="changeRole(${user.id}, this.value)">
                        ${['STUDENT', 'TEACHER', 'ADMIN'].map(role => `<option value="${role}" ${user.role === role ? 'selected' : ''}>${role}</option>`).join('')}
                    </select>
                </td>
                <td>
                    <button onclick="toggleBlock(${user.id}, ${!user.blocked})" class="btn btn-outline btn-sm">
                        ${user.blocked ? t('unblock') : t('block')}
                    </button>
                </td>
                <td style="text-align:right">
                    <button onclick="deleteUser(${user.id})" class="btn btn-danger btn-sm">Жою</button>
                </td>
            </tr>
        `).join('');
    }

    async function changeRole(id, role) {
        await request(`/admin/users/${id}/role`, 'PUT', { role });
        toast('Рөл жаңартылды');
    }

    async function deleteUser(id) {
        await request(`/admin/users/${id}`, 'DELETE');
        toast('Пайдаланушы жойылды');
        loadAdminUsers();
    }

    async function toggleBlock(id, blocked) {
        await request(`/admin/users/${id}/block`, 'PUT', { blocked });
        toast(blocked ? 'Пользователь заблокирован' : 'Пользователь разблокирован');
        loadAdminUsers();
    }

    async function clearOldTests() {
        if (!confirm('Удалить все тесты, вопросы, сессии и ответы?')) return;
        const result = await request('/tests', 'DELETE');
        toast(`Удалено тестов: ${result.deleted}`);
        loadAdminTests();
    }

    async function clearUsers() {
        if (!confirm('Удалить все аккаунты, кроме текущего администратора?')) return;
        const result = await request('/admin/users?keepCurrent=true', 'DELETE');
        toast(`Удалено аккаунтов: ${result.deleted}`);
        loadAdminUsers();
    }

    async function loadAiUsage() {
        const usage = await request('/ai-usage/summary', 'GET');
        document.getElementById('aiUsage').innerHTML = `
            <div class="stat-grid">
                <div class="stat-tile"><span>Сұраныс</span><strong>${usage.requests}</strong></div>
                <div class="stat-tile"><span>Tokens</span><strong>${usage.tokensUsed}</strong></div>
                <div class="stat-tile"><span>Cost</span><strong>${Number(usage.costEstimate).toFixed(4)}</strong></div>
            </div>
        `;
    }

    async function loadAdminTests() {
        const rows = await request('/tests/admin/overview', 'GET');
        const totalTests = rows.length;
        const totalAttempts = rows.reduce((sum, row) => sum + Number(row.totalAttempts || 0), 0);
        const completed = rows.reduce((sum, row) => sum + Number(row.completedAttempts || 0), 0);
        const avgPass = totalTests ? Math.round(rows.reduce((sum, row) => sum + Number(row.passRate || 0), 0) / totalTests) : 0;
        document.getElementById('adminTestStats').innerHTML = `
            <div class="stat-tile"><span>${t('allTests')}</span><strong>${totalTests}</strong></div>
            <div class="stat-tile"><span>${t('attempts')}</span><strong>${totalAttempts}</strong></div>
            <div class="stat-tile"><span>${t('completed')}</span><strong>${completed}</strong></div>
            <div class="stat-tile"><span>${t('passRate')}</span><strong>${avgPass}%</strong></div>
        `;
        document.getElementById('adminTestsBody').innerHTML = rows.map(row => `
            <tr>
                <td><b>${escapeHtml(row.title)}</b><span class="muted-small">${escapeHtml(row.topic || '')}</span></td>
                <td>${escapeHtml(row.teacher || '-')}</td>
                <td><span class="badge">${escapeHtml(row.status || '-')}</span></td>
                <td>${row.completedAttempts || 0} / ${row.totalAttempts || 0}<div class="progress-track"><div class="progress-fill" style="width:${row.completionRate || 0}%"></div></div></td>
                <td>${Math.round(Number(row.averageScore || 0))} / ${row.questionCount || 0}<span class="muted-small">${row.averagePercent || 0}%</span></td>
                <td>${row.passedCount || 0}<div class="progress-track"><div class="progress-fill" style="width:${row.passRate || 0}%"></div></div><span class="muted-small">${row.passRate || 0}%</span></td>
                <td><button class="btn btn-outline btn-sm" onclick="copyAdminInvite('${row.accessCode || ''}')">${row.accessCode || '-'}</button></td>
            </tr>
        `).join('') || `<tr><td colspan="7">${t('noHistory')}</td></tr>`;
    }

    async function copyAdminInvite(code) {
        const link = `${location.origin}/dashboard.html?code=${encodeURIComponent(code)}`;
        await navigator.clipboard.writeText(link);
        toast(`${t('copiedInvite')}: ${code}`);
    }

    async function loadAudit() {
        const logs = await request('/admin/audit-logs', 'GET');
        document.getElementById('auditTableBody').innerHTML = logs.slice(-50).reverse().map(log => `
            <tr>
                <td>${log.userEmail || '-'}</td>
                <td>${log.action}</td>
                <td>${log.path || '-'}</td>
                <td>${log.ip || '-'}</td>
            </tr>
        `).join('');
    }

    async function saveAiSettings() {
        await request('/admin/ai-settings', 'POST', {
            provider: document.getElementById('aiProvider').value,
            model: document.getElementById('aiModel').value,
            baseUrl: document.getElementById('aiBaseUrl').value,
            timeoutSeconds: Number(document.getElementById('aiTimeout').value) || 10
        });
        toast('AI баптауы сақталды');
    }

    loadAdminUsers().catch(error => toast(error.message, false));
    loadAdminTests().catch(error => toast(error.message, false));
    loadAiUsage().catch(error => toast(error.message, false));
    loadAudit().catch(error => toast(error.message, false));
    document.addEventListener('languagechange', () => {
        loadAdminUsers().catch(() => {});
        loadAdminTests().catch(() => {});
    });
</script>
</body>
</html>
