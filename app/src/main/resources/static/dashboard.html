<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header id="global-header"></header>
<div class="container">
    <div id="welcome"></div>
    <div id="studentPanel" style="display:none">
        <div id="testsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px"></div>
    </div>
</div>
<script src="app.js"></script>
<script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) location.href = 'login.html';
    document.getElementById('welcome').innerHTML = `<h1>Привет, ${user.fullName || user.email}</h1><p>Роль: ${user.role}</p>`;

    if (user.role === 'TEACHER') location.href = 'tests.html';
    else if (user.role === 'STUDENT') {
      document.getElementById('studentPanel').style.display = 'block';
      api('/tests/my', 'GET').then(tests => {
        const grid = document.getElementById('testsGrid');
        if (!tests.length) grid.innerHTML = '<p>Тестов пока нет</p>';
        else tests.forEach(t => {
          grid.innerHTML += `<div class="card"><h3>${t.title}</h3><p>${t.topic || ''}</p><button onclick="start(${t.id})" class="btn-primary">Пройти</button></div>`;
        });
      }).catch(e => toast(e.message, false));
    }

    function start(id) {
      localStorage.setItem('active_test_id', id);
      location.href = 'session.html';
    }
</script>
</body>
</html>
