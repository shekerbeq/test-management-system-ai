<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header id="global-header"></header>
<main class="container">
    <section class="panel section-title">
        <span class="eyebrow">Студент панелі</span>
        <h1 id="welcome">Қош келдіңіз</h1>
        <p>Жарияланған тесттерді ашып, бірден тапсыруға болады.</p>
    </section>
    <section id="testsGrid" class="questions-panel"></section>
</main>
<script src="app.js"></script>
<script>
    const user = currentUser();
    if (!user) location.href = 'login.html';
    if (user.role === 'TEACHER') location.href = 'tests.html';

    document.getElementById('welcome').textContent = `Сәлем, ${user.fullName || user.email}`;

    request('/tests/all', 'GET')
        .then(tests => {
            const grid = document.getElementById('testsGrid');
            const published = tests.filter(test => test.status === 'PUBLISHED' || !test.status);
            if (!published.length) {
                grid.innerHTML = '<div class="panel"><h2>Әзірге тест жоқ</h2><p>Оқытушы тест жариялаған соң, ол осы жерде көрінеді.</p></div>';
                return;
            }
            grid.innerHTML = published.map(test => `
                <article class="card">
                    <span class="badge">${test.difficulty}</span>
                    <h2>${test.title}</h2>
                    <p>${test.topic || ''}</p>
                    <p>${test.count} сұрақ · ${test.timerMin || 0} минут · ${test.language}</p>
                    <button class="btn btn-primary" onclick="startTest(${test.id})">Тапсыру</button>
                </article>
            `).join('');
        })
        .catch(error => toast(error.message, false));

    function startTest(id) {
        localStorage.setItem('active_test_id', id);
        location.href = 'session.html';
    }
</script>
</body>
</html>
