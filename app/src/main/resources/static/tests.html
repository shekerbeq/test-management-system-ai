<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои тесты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header id="global-header"></header>
<div class="container">
    <h1>Мои тесты</h1>
    <a href="create-test.html" class="btn-primary" style="margin-bottom:20px">Создать тест</a>
    <div id="grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px"></div>
</div>
<script src="app.js"></script>
<script>
    api('/tests/my', 'GET').then(tests => {
      const g = document.getElementById('grid');
      tests.forEach(t => {
        g.innerHTML += `<div class="card"><h3>${t.title}</h3><p>Вопросов: ${t.count}</p>
          <a href="statistics.html?id=${t.id}" class="btn-outline">Статистика</a>
          <button onclick="api('/tests/${t.id}','DELETE').then(()=>location.reload())" class="btn-danger" style="margin-left:10px">Удалить</button></div>`;
      });
    });
</script>
</body>
</html>
