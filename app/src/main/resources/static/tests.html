<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менің тесттерім</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header id="global-header"></header>
<main class="container">
    <section class="panel section-title">
        <span class="eyebrow">Teacher workspace</span>
        <h1>Менің тесттерім</h1>
        <p>Тесттерді жариялау, жабу, архивке жіберу және статистикасын қарау.</p>
        <a href="create-test.html" class="btn btn-primary">Жаңа тест жасау</a>
    </section>
    <section id="grid" class="questions-panel"></section>
</main>
<script src="app.js"></script>
<script>
    const user = currentUser();
    request(`/tests/my?creatorId=${user?.id || 1}`, 'GET')
        .then(tests => {
            const grid = document.getElementById('grid');
            if (!tests.length) {
                grid.innerHTML = '<div class="panel"><h2>Тест жоқ</h2><p>AI генерация арқылы бірінші тестіңізді жасаңыз.</p></div>';
                return;
            }
            grid.innerHTML = tests.map(test => `
                <article class="card">
                    <span class="badge">${test.status}</span>
                    <h2>${test.title}</h2>
                    <p>${test.topic || ''}</p>
                    <p>${test.count} сұрақ · ${test.questionType} · ${test.timerMin || 0} минут</p>
                    <div class="toolbar">
                        <a href="statistics.html?id=${test.id}" class="btn btn-outline">Статистика</a>
                        <button class="btn btn-outline" onclick="setStatus(${test.id}, 'PUBLISHED')">Жариялау</button>
                        <button class="btn btn-outline" onclick="setStatus(${test.id}, 'CLOSED')">Жабу</button>
                        <button class="btn btn-danger" onclick="removeTest(${test.id})">Жою</button>
                    </div>
                </article>
            `).join('');
        })
        .catch(error => toast(error.message, false));

    async function setStatus(id, status) {
        const test = await request(`/tests/${id}`, 'GET');
        await request(`/tests/${id}`, 'PUT', { ...test, status });
        location.reload();
    }

    async function removeTest(id) {
        await request(`/tests/${id}`, 'DELETE');
        location.reload();
    }
</script>
</body>
</html>
