<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — Eduvibe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="global-header"></header>

    <div class="container" style="max-width: 480px; margin-top: 5vh;">
        <div class="card animate-fade-up">
            <h2 style="text-align: center; margin-bottom: 8px;">Регистрация</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px;">Выберите вашу роль в системе</p>
            
            <form id="regForm">
                <label>Имя пользователя</label>
                <input type="text" id="name" placeholder="Иван Иванов" required>

                <label>Email</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
                
                <label>Пароль</label>
                <input type="password" id="password" required>

                <label>Ваша роль</label>
                <select id="role">
                    <option value="ROLE_STUDENT">Я Студент (прохожу тесты)</option>
                    <option value="ROLE_TEACHER">Я Преподаватель (создаю тесты)</option>
                </select>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">Зарегистрироваться</button>
            </form>

            <p style="text-align: center; margin-top: 25px; font-size: 14px;">
                Уже есть аккаунт? <a href="login.html" style="color: var(--text-main); font-weight: 700;">Войти</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const body = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                await request('/auth/register', 'POST', body);
                showToast("Аккаунт создан! Перенаправляем на вход...");
                setTimeout(() => window.location.href = 'login.html', 1500);
            } catch (err) {
                showToast(err.message, "error");
            }
        };
    </script>
</body>
</html>
