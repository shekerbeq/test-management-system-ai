<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кіру — Eduvibe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header id="global-header"></header>
<main class="container auth-wrap">
    <section class="card auth-card">
        <span class="eyebrow">Қош келдіңіз</span>
        <h1>Жүйеге кіру</h1>
        <p>Тесттерді жасау немесе тапсыру үшін аккаунтыңызға кіріңіз.</p>
        <form id="f">
            <label>Email
                <input type="email" id="email" required>
            </label>
            <label>Құпия сөз
                <input type="password" id="password" required>
            </label>
            <button type="submit" class="btn btn-primary" style="width:100%">Кіру</button>
        </form>
    </section>
</main>
<script src="app.js"></script>
<script>
    document.getElementById('f').onsubmit = async (e) => {
        e.preventDefault();
        try {
            const d = await api('/auth/login', 'POST', {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            localStorage.setItem('jwt', d.token);
            localStorage.setItem('user', JSON.stringify({ id: d.id, email: d.email, role: d.role, fullName: d.fullName }));
            toast('Сәтті кірдіңіз');
            location.href = 'dashboard.html';
        } catch (err) {
            toast(err.message, false);
        }
    };
</script>
</body>
</html>
