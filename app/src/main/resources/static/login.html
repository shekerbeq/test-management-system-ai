<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — Eduvibe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="global-header"></header>

    <div class="container" style="max-width: 480px; margin-top: 5vh;">
        <div class="card animate-fade-up">
            <h2 style="text-align: center; margin-bottom: 8px;">Рады вас видеть</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px;">Войдите в личный кабинет</p>
            
            <form id="loginForm">
                <label>Ваш Email</label>
                <input type="email" id="email" placeholder="student@test.ru" required>
                
                <label>Пароль</label>
                <input type="password" id="password" required>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">Войти</button>
            </form>

            <div style="margin-top: 25px; padding: 15px; background: var(--bg); border-radius: 12px; font-size: 13px;">
                <p style="font-weight: 700; margin-bottom: 5px;">🔥 Быстрый вход (без регистрации):</p>
                <p>Преподаватель: <span style="font-family: monospace;">teacher@test.ru</span> (пароль: 123)</p>
                <p>Студент: <span style="font-family: monospace;">student@test.ru</span> (пароль: 123)</p>
            </div>

            <p style="text-align: center; margin-top: 25px; font-size: 14px;">
                Новенький здесь? <a href="register.html" style="color: var(--text-main); font-weight: 700;">Создать аккаунт</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await request('/auth/login', 'POST', { email, password });
                showToast("Успешный вход!");
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (err) {
                showToast(err.message || "Ошибка авторизации", "error");
            }
        };
    </script>
</body>
</html>
