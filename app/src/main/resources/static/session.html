<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Прохождение теста</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header id="global-header"></header>
<div class="container" style="max-width: 700px;">
    <div class="card" id="qCard">
        <h2 id="qTitle"></h2>
        <div id="qOptions"></div>
        <button id="nextBtn" class="btn-primary" style="margin-top:20px;width:100%">Подтвердить ответ</button>
    </div>
</div>

<script src="app.js"></script>
<script>
    const testId = localStorage.getItem('active_test_id');
    const studentId = 2; // временно, нужно получать из токена
    let sessionId, questions = [], currentIdx = 0, selectedAnswer = null, score = 0;

    async function init() {
        // Начинаем сессию
        const session = await request(`/tests/${testId}/start?studentId=${studentId}`, 'POST');
        sessionId = session.id;

        // Получаем вопросы теста (эндпоинт /tests/{testId}/questions ещё не реализован, сделаем через сессию)
        // Пока для получения вопросов нужно загрузить их через API (добавим отдельно)
        const testData = await request(`/tests/${testId}`, 'GET');
        if (!testData.questions) {
            // Вопросы хранятся в другой сущности, нужно загрузить через репозиторий
            // Простой путь: сделаем отдельный эндпоинт GET /tests/{testId}/questions
            // Сейчас быстро создадим его в TestConfigController
        }
        // Временно используем мок
        questions = [
            { id: 1, text: "Пример вопроса 1", options: ["A", "B", "C"], correctIndex: 0 },
            { id: 2, text: "Пример вопроса 2", options: ["X", "Y", "Z"], correctIndex: 2 }
        ];
        if (questions.length > 0) renderQuestion();
    }

    function renderQuestion() {
        if (currentIdx >= questions.length) {
            finishTest();
            return;
        }
        const q = questions[currentIdx];
        document.getElementById('qTitle').textContent = q.text;
        const opts = document.getElementById('qOptions');
        opts.innerHTML = q.options.map((opt, i) => `
            <label style="display:block; margin-bottom:8px;">
                <input type="radio" name="answer" value="${i}" onchange="selectedAnswer=${i}"> ${opt}
            </label>
        `).join('');
    }

    document.getElementById('nextBtn').onclick = async () => {
        if (selectedAnswer === null) {
            showToast("Выберите ответ", false);
            return;
        }
        const q = questions[currentIdx];
        await request(`/tests/sessions/${sessionId}/answers?questionId=${q.id}&selectedIndex=${selectedAnswer}`, 'POST');
        if (selectedAnswer === q.correctIndex) score++;
        currentIdx++;
        selectedAnswer = null;
        renderQuestion();
    };

    async function finishTest() {
        await request(`/tests/sessions/${sessionId}/finish`, 'POST');
        const result = await request(`/tests/sessions/${sessionId}`, 'GET');
        document.getElementById('qCard').innerHTML = `
            <h2>Тест завершён</h2>
            <p>Ваш результат: ${result.score} из ${questions.length}</p>
            <a href="dashboard.html" class="btn-primary">На главную</a>
        `;
    }

    init();
</script>
</body>
</html>
