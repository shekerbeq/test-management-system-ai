global:
  scrape_interval: 15s

scrape_configs:
  - job_name: tms-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app:8080"]

  - job_name: tms-postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: tms-redis
    static_configs:
      - targets: ["redis-exporter:9121"]
